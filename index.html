<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Life Admin — gamified, gentle</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="styles/tokens.css" />

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#14110d" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Life Admin" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body, #root { height: 100%; }
  body {
    background:
      radial-gradient(1200px 800px at 20% 0%, #2a221a 0%, transparent 60%),
      radial-gradient(900px 700px at 80% 100%, #2a261c 0%, transparent 50%),
      #14110d;
  }
  [data-theme="dark"] body, [data-variant="strict"] body {} /* page bg via .stage */

  .stage {
    min-height: 100%;
    width: 100%;
    padding: 36px 28px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }
  .stage-head {
    width: 100%;
    max-width: 1320px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    color: #f0e7d8;
    margin-bottom: 4px;
  }
  .stage-head h1 {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: 40px;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .stage-head h1 em { color: #d8c39a; }
  .stage-head .meta {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(240, 231, 216, 0.5);
    text-align: right;
  }

  .row {
    width: 100%;
    max-width: 1320px;
    display: flex;
    flex-wrap: wrap;
    gap: 28px;
    justify-content: center;
  }

  .frame-cell {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }
  .frame-cap {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(240, 231, 216, 0.55);
  }
  .frame-cap .num {
    color: #d8c39a;
    margin-right: 8px;
  }

  /* Tweaks panel */
  .tweaks {
    position: fixed;
    bottom: 18px;
    right: 18px;
    width: 280px;
    background: #1a1612;
    border: 1px solid rgba(240, 231, 216, 0.12);
    border-radius: 14px;
    padding: 16px;
    color: #f0e7d8;
    font-family: var(--font-ui);
    font-size: 12px;
    z-index: 100;
    box-shadow: 0 16px 60px rgba(0,0,0,0.5);
  }
  .tweaks h3 {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 400;
    font-size: 18px;
    margin: 0 0 12px;
  }
  .tweaks .grp { margin-bottom: 14px; }
  .tweaks .grp:last-child { margin-bottom: 0; }
  .tweaks .lbl {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(240, 231, 216, 0.5);
    margin-bottom: 6px;
  }
  .tweaks .seg {
    display: flex;
    background: rgba(240, 231, 216, 0.06);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }
  .tweaks .seg button {
    flex: 1;
    padding: 7px 8px;
    border-radius: 6px;
    font-size: 11px;
    color: rgba(240, 231, 216, 0.6);
    text-align: center;
  }
  .tweaks .seg button.on {
    background: #f0e7d8;
    color: #1a1612;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="frames/android-frame.jsx"></script>
<script type="text/babel" src="frames/browser-window.jsx"></script>
<script type="text/babel" src="app/shared.jsx"></script>
<script type="text/babel" src="app/screens-1.jsx"></script>
<script type="text/babel" src="app/screens-2.jsx"></script>
<script type="text/babel" src="app/screens-3.jsx"></script>
<script type="text/babel" src="app/screens-4.jsx"></script>
<script type="text/babel" src="app/desktop.jsx"></script>

<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "variant": "warm",
  "intensity": "loud"
}/*EDITMODE-END*/;

/* ─────────────── Phone wrapper that scales to fit a target height ─────────────── */
const PhoneFrame = ({ children, label, num, scale = 0.78 }) => (
  <div className="frame-cell">
    <div className="frame-cap"><span className="num">{num}</span>{label}</div>
    <div style={{
      width: 412 * scale, height: 892 * scale,
      display:'flex', alignItems:'flex-start', justifyContent:'center'
    }}>
      <div style={{ transform:`scale(${scale})`, transformOrigin:'top left' }}>
        <AndroidDevice width={412} height={892}>
          {children}
        </AndroidDevice>
      </div>
    </div>
  </div>
);

const App = () => {
  const [theme, setTheme] = React.useState(TWEAKS.theme);
  const [variant, setVariant] = React.useState(TWEAKS.variant);
  const [intensity, setIntensity] = React.useState(TWEAKS.intensity);
  const [editMode, setEditMode] = React.useState(false);

  const state = useAppState();

  // Apply data attrs to root
  React.useEffect(() => {
    const v = variant === 'strict' ? 'strict' : 'warm';
    if (v === 'strict') document.documentElement.setAttribute('data-variant', 'strict');
    else document.documentElement.removeAttribute('data-variant');
    if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    else document.documentElement.removeAttribute('data-theme');
  }, [theme, variant]);

  // Tweaks protocol
  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setEditMode(true);
      if (e.data.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const persist = (edits) => {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  };

  // Selected task for the detail screen — pick one with subtasks (the OKR one)
  const featuredTask = state.tasks.find(t => t.id === 't7');
  const homeTask = state.tasks.find(t => t.id === 't4'); // deep clean kitchen w/ subtasks

  // Background per theme
  const pageBg = theme === 'dark'
    ? 'radial-gradient(1200px 800px at 20% 0%, #1a1814 0%, transparent 60%), #0a0908'
    : variant === 'strict'
      ? 'radial-gradient(1200px 800px at 20% 0%, #2a2826 0%, transparent 60%), #161412'
      : 'radial-gradient(1200px 800px at 20% 0%, #2a221a 0%, transparent 60%), radial-gradient(900px 700px at 80% 100%, #2a261c 0%, transparent 50%), #14110d';

  return (
    <div className="stage" style={{ background: pageBg }}>
      <style>{`body { background: ${pageBg}; }`}</style>

      {/* HEADER */}
      <div className="stage-head">
        <div>
          <div style={{ fontFamily:'var(--font-mono)', fontSize:11, letterSpacing:'0.14em',
            textTransform:'uppercase', color:'rgba(240,231,216,0.5)', marginBottom:6 }}>
            Concept · Android + Web · {variant === 'strict' ? 'Variant B / Strict mono' : 'Variant A / Warm editorial'} · {theme === 'dark' ? 'Dark' : 'Light'} · Gamification {intensity}
          </div>
          <h1>Life <em>Admin</em></h1>
          <div style={{ marginTop:8, color:'rgba(240,231,216,0.6)', fontSize:13, maxWidth:680, lineHeight:1.5,
            fontFamily:'var(--font-display)', fontStyle:'italic' }}>
            A quietly gamified place for chores, bills, habits, and the rest of life's logistics — on Android first, on the web too.
          </div>
        </div>
        <div className="meta">
          MMXXVI · v 1.0<br/>
          For Alex, 35<br/>
          <span style={{ color:'#d8c39a' }}>Tap any frame · live</span>
        </div>
      </div>

      {/* ROW 1: Onboarding flow */}
      <SectionLabel num="01" title="Onboarding" sub="Three steps. No clutter."/>
      <div className="row">
        <PhoneFrame num="1.1" label="Splash">
          <SplashScreen onContinue={() => {}}/>
        </PhoneFrame>
        <PhoneFrame num="1.2" label="Pick or create areas">
          <OnboardingScreen onDone={() => {}} state={state}/>
        </PhoneFrame>
        <PhoneFrame num="1.3" label="First capture">
          <AddScreen onClose={() => {}} onAdd={() => {}}/>
        </PhoneFrame>
      </div>

      {/* ROW 2: Daily — dashboard, category, list */}
      <SectionLabel num="02" title="Daily" sub="Dashboard · category carousel · task list"/>
      <div className="row">
        <PhoneFrame num="2.1" label="Today (dashboard)">
          <DashboardWithNav state={state} intensity={intensity}/>
        </PhoneFrame>
        <PhoneFrame num="2.2" label="Category — Health">
          <CategoryWithNav state={state} startCat="health" intensity={intensity}/>
        </PhoneFrame>
        <PhoneFrame num="2.3" label="Category — Finance">
          <CategoryWithNav state={state} startCat="finance" intensity={intensity}/>
        </PhoneFrame>
      </div>

      {/* ROW 3: HERO — Task detail + Pomodoro */}
      <SectionLabel num="03" title="Task detail · live Pomodoro" sub="Hero — open the timer in any frame and press Start" hero/>
      <div className="row">
        <PhoneFrame num="3.1" label="Multi-step task" scale={0.92}>
          <TaskDetail t={state.tasks.find(x=>x.id==='t7')} state={state} onClose={()=>{}} intensity={intensity}/>
        </PhoneFrame>
        <PhoneFrame num="3.2" label="Recurring habit" scale={0.92}>
          <TaskDetail t={state.tasks.find(x=>x.id==='t11')} state={state} onClose={()=>{}} intensity={intensity}/>
        </PhoneFrame>
        <PhoneFrame num="3.3" label="Quick win" scale={0.92}>
          <TaskDetail t={state.tasks.find(x=>x.id==='t14')} state={state} onClose={()=>{}} intensity={intensity}/>
        </PhoneFrame>
      </div>

      {/* ROW 4: Progress / Calendar / Review */}
      <SectionLabel num="04" title="The long view" sub="Progress · Calendar · Sunday review"/>
      <div className="row">
        <PhoneFrame num="4.1" label="Progress">
          <ProgressScreenWithNav state={state} intensity={intensity}/>
        </PhoneFrame>
        <PhoneFrame num="4.2" label="Calendar">
          <CalendarScreenWithNav state={state} intensity={intensity}/>
        </PhoneFrame>
        <PhoneFrame num="4.3" label="Weekly review">
          <ReviewScreenWithNav state={state} intensity={intensity}/>
        </PhoneFrame>
      </div>

      {/* ROW 5: Goals + Journal (NEW) */}
      <SectionLabel num="05" title="Goals · Journal" sub="Above the tasks: what you're aiming at, and how you're showing up" hero/>
      <div className="row">
        <PhoneFrame num="5.1" label="Goals">
          <GoalsWithNav state={state} intensity={intensity}/>
        </PhoneFrame>
        <PhoneFrame num="5.2" label="Journal — morning">
          <JournalWithNav state={state} intensity={intensity}/>
        </PhoneFrame>
        <PhoneFrame num="5.3" label="Journal — evening">
          <JournalEveningFrame state={state} intensity={intensity}/>
        </PhoneFrame>
      </div>

      {/* ROW 6: All-tasks + Inbox + Capture */}
      <SectionLabel num="06" title="Capture · Inbox · All tasks" sub="Everything in one place when you need it"/>
      <div className="row">
        <PhoneFrame num="6.1" label="All tasks (cross-area)">
          <AllTasksWithNav state={state} intensity={intensity}/>
        </PhoneFrame>
        <PhoneFrame num="6.2" label="Inbox (incl. RSS)">
          <InboxScreen onClose={()=>{}}/>
        </PhoneFrame>
        <PhoneFrame num="6.3" label="Capture (NL parser)">
          <AddScreen onClose={()=>{}} onAdd={(text, p) => {}}/>
        </PhoneFrame>
      </div>

      {/* ROW 7: New capabilities (scheduling · settings · notifications) */}
      <SectionLabel num="07" title="Schedule · Settings · Notifications" sub="Adjustable Pomodoro · recurring tasks · dark-mode · due-task alerts" hero/>
      <div className="row">
        <PhoneFrame num="7.1" label="Schedule & recurrence">
          <ScheduleSheetFrame state={state}/>
        </PhoneFrame>
        <PhoneFrame num="7.2" label="Settings (theme, notifs, pomodoro)">
          <SettingsFrame theme={theme} setTheme={setTheme}/>
        </PhoneFrame>
        <PhoneFrame num="7.3" label="Lockscreen notifications">
          <NotifPreview/>
        </PhoneFrame>
      </div>

      {/* ROW 8: Web (desktop) */}
      <SectionLabel num="08" title="Same product · on the web" sub="Browser version uses the same components and tokens"/>
      <div className="row">
        <div className="frame-cell">
          <div className="frame-cap"><span className="num">6.1</span>web app — today + detail</div>
          <ChromeWindow
            tabs={[{ title: 'Life Admin' }, { title: 'Mail' }, { title: 'Calendar' }]}
            activeIndex={0}
            url="lifeadmin.app/today"
            width={1280} height={780}
          >
            <DesktopApp state={state} intensity={intensity}/>
          </ChromeWindow>
        </div>
      </div>

      {/* DESIGN NOTES */}
      <SectionLabel num="09" title="Notes" sub="What's in here, and why"/>
      <div className="row" style={{ maxWidth: 1100 }}>
        <NoteCard title="Two visual variants">
          A — warm editorial: Instrument Serif headlines, JetBrains Mono for data, deep olive accent.
          B — strict mono: same skeleton, no colour. Toggle in Tweaks.
        </NoteCard>
        <NoteCard title="Gamification, dialled">
          XP, streaks, levels are present but never celebratory.
          Subtle / Balanced / Loud removes the chrome at three intensities — Subtle hides the dashboard XP card entirely.
        </NoteCard>
        <NoteCard title="Built on real frameworks">
          GTD inbox, 7 Habits Eisenhower matrix, live Pomodoro per task,
          win journal, weekly review. All wired, none decorative.
        </NoteCard>
        <NoteCard title="Effort sizing">
          S (5m / 5 XP) · M (20m / 15 XP) · L (60m / 40 XP).
          Pomodoro length matches effort. Larger tasks earn multipliers without guilt.
        </NoteCard>
        <NoteCard title="Calendar + RSS">
          Calendar replaces the brief's NRL ticker with a week strip and month density grid.
          Inbox accepts captures, voice memos, email, and RSS items.
        </NoteCard>
        <NoteCard title="Android + web parity">
          Same component model, same tokens, same behaviour.
          Phone is one-handed and dense; web is two-pane (list + live detail).
        </NoteCard>
      </div>

      <ConfettiPortal confetti={state.confetti}/>

      {/* TWEAKS PANEL */}
      {editMode && (
        <div className="tweaks">
          <h3>Tweaks</h3>
          <div className="grp">
            <div className="lbl">Theme</div>
            <div className="seg">
              {['light','dark'].map(t => (
                <button key={t} className={theme===t ? 'on' : ''}
                  onClick={() => { setTheme(t); persist({ theme: t }); }}>{t}</button>
              ))}
            </div>
          </div>
          <div className="grp">
            <div className="lbl">Variant</div>
            <div className="seg">
              {[{id:'warm',l:'Warm A'},{id:'strict',l:'Strict B'}].map(x => (
                <button key={x.id} className={variant===x.id ? 'on' : ''}
                  onClick={() => { setVariant(x.id); persist({ variant: x.id }); }}>{x.l}</button>
              ))}
            </div>
          </div>
          <div className="grp">
            <div className="lbl">Gamification intensity</div>
            <div className="seg">
              {['subtle','balanced','loud'].map(x => (
                <button key={x} className={intensity===x ? 'on' : ''}
                  onClick={() => { setIntensity(x); persist({ intensity: x }); }}>{x}</button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

const SectionLabel = ({ num, title, sub, hero }) => (
  <div style={{ width:'100%', maxWidth:1320, marginTop: 12,
    display:'flex', alignItems:'baseline', gap:18,
    paddingBottom:10, borderBottom:'1px solid rgba(240,231,216,0.10)' }}>
    <div style={{ fontFamily:'var(--font-mono)', fontSize:12, color:'#d8c39a', letterSpacing:0.16,
      textTransform:'uppercase', minWidth:30 }}>{num}</div>
    <div style={{ flex:1 }}>
      <div style={{ fontFamily:'var(--font-display)', fontSize: hero ? 30 : 22, color:'#f0e7d8',
        fontStyle: hero ? 'italic' : 'normal' }}>{title}</div>
      <div style={{ fontSize:11, color:'rgba(240,231,216,0.5)', marginTop:2,
        fontFamily:'var(--font-mono)', letterSpacing:0.06 }}>{sub}</div>
    </div>
    {hero && <div style={{ fontFamily:'var(--font-mono)', fontSize:10, color:'#d8c39a',
      letterSpacing:0.14, textTransform:'uppercase' }}>★ HERO</div>}
  </div>
);

const NoteCard = ({ title, children }) => (
  <div style={{
    flex:'1 1 320px', maxWidth:360, padding:18,
    border:'1px solid rgba(240,231,216,0.12)', borderRadius:12,
    background:'rgba(240,231,216,0.03)', color:'#f0e7d8',
  }}>
    <div style={{ fontFamily:'var(--font-display)', fontSize:18, marginBottom:8 }}>{title}</div>
    <div style={{ fontSize:12, color:'rgba(240,231,216,0.7)', lineHeight:1.5 }}>{children}</div>
  </div>
);

const ConfettiPortal = ({ confetti }) =>
  confetti ? <ConfettiBurst x={confetti.x} y={confetti.y} xp={confetti.xp} /> : null;

/* ─────────────── Phone screens with bottom nav and screen routing ─────────────── */
const PhoneShell = ({ state, intensity, initialTab = 'dashboard' }) => {
  const [tab, setTab] = React.useState(initialTab);
  const [openCat, setOpenCat] = React.useState(null);
  const [openTask, setOpenTask] = React.useState(null);
  const [showAdd, setShowAdd] = React.useState(false);

  const onAddTap = () => setShowAdd(true);
  React.useEffect(() => {
    if (tab === 'add') { setShowAdd(true); setTab('dashboard'); }
  }, [tab]);

  if (showAdd) return <AddScreen onClose={() => setShowAdd(false)} onAdd={() => {}}/>;
  if (openTask) return <TaskDetail t={openTask} state={state} onClose={() => setOpenTask(null)} intensity={intensity}/>;
  if (openCat) return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
      <div style={{ flex:1, minHeight:0 }}>
        <CategoryCarousel state={state} startCat={openCat} intensity={intensity}
          openTask={(t) => setOpenTask(t)} onClose={() => setOpenCat(null)}/>
      </div>
      <BottomNav tab={tab} setTab={setTab} intensity={intensity}/>
    </div>
  );

  let content;
  if (tab === 'dashboard') content = <DashboardScreen state={state} intensity={intensity}
    openCategory={(c) => setOpenCat(c)} openTask={(t) => setOpenTask(t)}/>;
  else if (tab === 'progress') content = <ProgressScreen state={state}/>;
  else if (tab === 'calendar') content = <CalendarScreen state={state}/>;
  else if (tab === 'review') content = <ReviewScreen state={state}/>;
  else if (tab === 'goals') content = <GoalsScreen state={state} intensity={intensity} openTask={(t) => setOpenTask(t)}/>;
  else if (tab === 'journal') content = <JournalScreen state={state} intensity={intensity}/>;
  else if (tab === 'all') content = <AllTasksScreen state={state} intensity={intensity} openTask={(t) => setOpenTask(t)}/>;
  else content = <DashboardScreen state={state} intensity={intensity}
    openCategory={(c) => setOpenCat(c)} openTask={(t) => setOpenTask(t)}/>;

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
      <div style={{ flex:1, minHeight:0, overflowY:'auto' }} className="no-scrollbar">{content}</div>
      <BottomNav tab={tab} setTab={setTab} intensity={intensity}/>
    </div>
  );
};

const DashboardWithNav = ({ state, intensity }) => <PhoneShell state={state} intensity={intensity} initialTab="dashboard"/>;
const ProgressScreenWithNav = ({ state, intensity }) => <PhoneShell state={state} intensity={intensity} initialTab="progress"/>;
const CalendarScreenWithNav = ({ state, intensity }) => <PhoneShell state={state} intensity={intensity} initialTab="calendar"/>;
const ReviewScreenWithNav = ({ state, intensity }) => <PhoneShell state={state} intensity={intensity} initialTab="review"/>;
const GoalsWithNav = ({ state, intensity }) => <PhoneShell state={state} intensity={intensity} initialTab="goals"/>;
const JournalWithNav = ({ state, intensity }) => <PhoneShell state={state} intensity={intensity} initialTab="journal"/>;
const JournalEveningFrame = ({ state, intensity }) => (
  <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
    <div style={{ flex:1, minHeight:0, overflowY:'auto' }}>
      <JournalScreen state={state} intensity={intensity} initialPhase="evening"/>
    </div>
    <BottomNav tab="journal" setTab={() => {}} intensity={intensity}/>
  </div>
);
const AllTasksWithNav = ({ state, intensity }) => <PhoneShell state={state} intensity={intensity} initialTab="all"/>;

const CategoryWithNav = ({ state, startCat, intensity }) => {
  const [openTask, setOpenTask] = React.useState(null);
  const [tab, setTab] = React.useState('dashboard');
  if (openTask) return <TaskDetail t={openTask} state={state} onClose={() => setOpenTask(null)} intensity={intensity}/>;
  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
      <div style={{ flex:1, minHeight:0 }}>
        <CategoryCarousel state={state} startCat={startCat} intensity={intensity}
          openTask={(t) => setOpenTask(t)} onClose={() => {}}/>
      </div>
      <BottomNav tab={tab} setTab={setTab} intensity={intensity}/>
    </div>
  );
};

/* ─────────────── Row 7 wrapper: Schedule sheet ─────────────── */
const ScheduleSheetFrame = ({ state }) => {
  const task = state.tasks.find(t => t.id === 't7') || state.tasks[0];
  return <ScheduleSheet task={task} onClose={() => {}} onSave={() => {}}/>;
};

/* ─────────────── Row 7 wrapper: Settings ─────────────── */
const SettingsFrame = ({ theme, setTheme }) => {
  const [notif, setNotif] = React.useState({
    due: true, overdue: false, pom: true,
    journal: false, streak: true, weekly: true, quiet: true,
  });
  const [defPom, setDefPom] = React.useState(25);
  return (
    <SettingsScreen
      theme={theme} setTheme={setTheme}
      notif={notif} setNotif={setNotif}
      defPom={defPom} setDefPom={setDefPom}
      onClose={() => {}}
    />
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- Service Worker registration -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('[SW] Registered:', reg.scope))
        .catch(err => console.warn('[SW] Registration failed:', err));
    });
  }
</script>
</body>
</html>
